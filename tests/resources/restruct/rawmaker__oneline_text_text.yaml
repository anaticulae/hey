- children:
  - - TextContainer
    - - 'The RestructuredText Book Documentation, Release 0.1

        '
  - - TextContainer
    - - 'Getting Started

        '
  - - TextContainer
    - - 'Now you are ready to creating documentation. Create a directory called crawler.
        Inside that directory you should

        '
      - 'create a docs directory, and move into it:

        '
  - - TextContainer
    - - 'mkdir crawler

        '
      - 'cd crawler

        '
      - 'mkdir docs

        '
      - 'cd docs

        '
  - - TextContainer
    - - 'Then you can create the Sphinx project skeleton in this directory:

        '
  - - TextContainer
    - - 'sphinx-quickstart

        '
  - - TextContainer
    - - 'accepting all the defaults, calling the project Crawler, and giving it a
        1.0 version. Your file system should now look

        '
      - 'similar to this:

        '
  - - TextContainer
    - - 'crawler/

        '
  - - TextContainer
    - - 'docs/

        '
  - - TextContainer
    - - 'conf.py

        '
      - 'index.rst

        '
      - 'Makefile

        '
  - - TextContainer
    - - 'We have a top-level docs directory in the main project directory. Inside
        of this is:

        '
      - 'index.rst: This is the index file for the documentation, or what lives at
        /. It normally contains a Table of Contents

        '
  - - TextContainer
    - - 'that will link to all other pages of the documentation.

        '
  - - TextContainer
    - - "conf.py: which allows for customization of Sphinx. You won\u2019t need to\
        \ use this too much yet, but it\u2019s good to be\n"
  - - TextContainer
    - - 'familiar with this file.

        '
  - - TextContainer
    - - "Makefile: This ships with Sphinx, and is the main interface for local development,\
        \ and shouldn\u2019t be changed.\n"
      - '_build: The directory that your output files go into.

        '
      - '_static: The directory to include all your static files, like images.

        '
      - '_templates: Allows you to override Sphinx templates to customze look and
        feel.

        '
  - - TextContainer
    - - 'Building docs

        '
  - - TextContainer
    - - "Let\u2019s build our docs into HTML to see how it works. Simply run:\n"
  - - TextContainer
    - - '# Inside top-level docs/ directory.

        '
      - 'make html

        '
  - - TextContainer
    - - 'This should run Sphinx in your shell, and output HTML. At the end, it should
        say something about the documents

        '
      - 'being ready in _build/html. You can now open them in your browser by typing:

        '
  - - TextContainer
    - - 'open _build/html/index.html

        '
  - - TextContainer
    - - "This should display a rendered HTML page that says Welcome to Crawler\u2019\
        s documentation! at the top.\n"
      - 'make html is the main way you will build HTML documentation locally. It is
        simply a wrapper around a more

        '
      - 'complex call to Sphinx.

        '
  - - TextContainer
    - - '10 Chapter 4. Sphinx Tutorial

        '
