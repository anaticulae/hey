- children:
  - - TextContainer
    - - 'The RestructuredText Book Documentation, Release 0.1

        '
  - - TextContainer
    - - '============

        '
      - 'Installation

        '
      - '============

        '
  - - TextContainer
    - - 'At the command line::

        '
  - - TextContainer
    - - 'easy_install crawler

        '
  - - TextContainer
    - - 'Or, if you have virtualenvwrapper installed:

        '
  - - TextContainer
    - - '.. code-block:: bash

        '
  - - TextContainer
    - - 'mkvirtualenv crawler

        '
      - 'pip install crawler

        '
  - - TextContainer
    - - 'Code Example Syntax

        '
  - - TextContainer
    - - 'This snippet introduces a couple of simple concepts. The syntax for displaying
        code is ::. When it is used at the end

        '
      - 'of a sentence, Sphinx is smart and displays one : in the output, and knows
        there is a code example in the following

        '
      - 'indented block.

        '
      - 'Sphinx, like Python, uses meaningful whitespace. Blocks of content are structured
        based on the indention level they

        '
      - 'are on. You can see this concept with our code-block directive above.

        '
  - - TextContainer
    - - 'Table of Contents Tree (toctree)

        '
  - - TextContainer
    - - 'Now would be a good time to introduce the toctree. One of the main concepts
        in Sphinx is that it allows multiple

        '
      - 'pages to be combined into a cohesive hierarchy. The toctree directive is
        a fundamental part of this structure. A

        '
      - 'simple toctree directive looks like this:

        '
  - - TextContainer
    - - '.. toctree::

        '
  - - TextContainer
    - - ':maxdepth: 2

        '
  - - TextContainer
    - - 'install

        '
      - 'support

        '
  - - TextContainer
    - - 'This will then output a Table of Contents in the page where this occurs.
        It will output the top-level headers of the

        '
      - 'pages as listed. This also tells Sphinx that the other pages are sub-pages
        of the current page.

        '
      - 'You should go ahead and include the above toctree directive in your index.rst
        file.

        '
  - - TextContainer
    - - 'Build Docs Again

        '
  - - TextContainer
    - - 'Now that you have a few pages of content, go ahead and build your docs again:

        '
  - - TextContainer
    - - 'make html

        '
  - - TextContainer
    - - 'If you open up your index.html, you should see the basic structure of your
        docs from the included toctree

        '
      - 'directive.

        '
  - - TextContainer
    - - 'Aside: Other formats

        '
  - - TextContainer
    - - '12 Chapter 4. Sphinx Tutorial

        '
