- children:
  - - TextContainer
    - - 'The RestructuredText Book Documentation, Release 0.1

        '
  - - TextContainer
    - - 'Documenting a Project

        '
  - - TextContainer
    - - "Now that we have our basic skeleton, let\u2019s document the project. As\
        \ you might have guessed from the name, we\u2019ll be\n"
      - 'documenting a basic web crawler.

        '
      - "For this project, we\u2019ll have the following pages:\n"
  - - TextContainer
    - - "\u2022 Index Page\n"
      - "\u2022 Support\n"
      - "\u2022 Installation\n"
      - "\u2022 Cookbook/Examples\n"
      - "\u2022 Command Line Options\n"
      - "\u2022 Changelog\n"
  - - TextContainer
    - - "Let\u2019s start with the Support page.\n"
  - - TextContainer
    - - 'Support docs

        '
  - - TextContainer
    - - "It\u2019s always important that users can ask questions when they get stuck.\
        \ There are many ways to handle this, but normal\n"
      - 'approaches are to have an IRC channel and mailing list.

        '
      - 'Go ahead and put this markup in your support.rst:

        '
  - - TextContainer
    - - '=======

        '
      - 'Support

        '
      - '=======

        '
  - - TextContainer
    - - 'The easiest way to get help with the project is to join the ``#crawler``

        '
      - 'channel on Freenode_. We hang out there and you can get real-time help with

        '
      - 'your projects. The other good way is to open an issue on Github_.

        '
  - - TextContainer
    - - 'The mailing list at https://groups.google.com/forum/#!forum/crawler is also
        available

        '
      - "\u02D3\u2192for support.\n"
  - - TextContainer
    - - '.. _Freenode: irc://freenode.net

        '
      - '.. _Github: http://github.com/example/crawler/issues

        '
  - - TextContainer
    - - 'Hyperlink Syntax

        '
  - - TextContainer
    - - 'The main new markup here is the link syntax. The link text is set by putting
        a _ after some text. The ` is used to group

        '
      - 'text, allowing you to include multiple words in your link text. You should
        use the `, even when the link text is only

        '
      - 'one word. This keeps the syntax consistent.

        '
      - 'The link target is defined at the bottom of the section with .. _<link text>:
        <target>.

        '
  - - TextContainer
    - - 'Installation docs

        '
  - - TextContainer
    - - 'Installation documentation is really important. Anyone who is coming to the
        project will need to install it. For our

        '
      - 'example, we are installing a basic Python script, so it will be pretty easy.

        '
      - 'Include the following in your install.rst:

        '
  - - TextContainer
    - - '4.1. Step 1 11

        '
