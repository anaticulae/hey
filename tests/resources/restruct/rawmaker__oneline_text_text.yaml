- children:
  - - TextContainer
    - - 'CHAPTER 4

        '
  - - TextContainer
    - - 'Sphinx Tutorial

        '
  - - TextContainer
    - - 'Step 1

        '
  - - TextContainer
    - - 'Getting Set Up

        '
  - - TextContainer
    - - 'Philosophy

        '
  - - TextContainer
    - - 'Sphinx is what is called a documentation generator. This means that it takes
        a bunch of source files in plain text, and

        '
      - 'generates a bunch of other awesome things, mainly HTML. For our use case
        you can think of it as a program that takes

        '
      - 'in plain text files in reStructuredText format, and outputs HTML.

        '
  - - TextContainer
    - - 'reST -> Sphinx -> HTML

        '
  - - TextContainer
    - - 'So as a user of Sphinx, your main job will be writing these text files. This
        means that you should be minimally

        '
      - "familiar with reStructuredText as a language. It\u2019s similar to Markdown\
        \ in a lot of ways, if you are already familiar\n"
      - 'with Markdown.

        '
  - - TextContainer
    - - 'Installing Sphinx

        '
  - - TextContainer
    - - 'The first step is installing Sphinx. Sphinx is a python project, so it can
        be installed like any other python library. Every

        '
      - 'Operating System should have Python pre-installed, so you should just have
        to run:

        '
  - - TextContainer
    - - 'sudo easy_install Sphinx

        '
  - - TextContainer
    - - 'Note: Advanced users can install this in a virtualenv if they wish. Also,
        pip install Sphinx works fine if you

        '
      - 'have Pip.

        '
  - - TextContainer
    - - '9

        '
