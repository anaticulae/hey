        '
  - - TextContainer
    - - "RestructuredText (reST) is a markup language, it\u2019s name coming from\
        \ that it\u2019s considered a revision and reinterpreta-\n"
      - 'tion of two other markup languages, Setext and StructuredText.

        '
      - 'Source: https://en.wikipedia.org/wiki/Restructured_Text

        '
      - 'This is a syntax guide designed to provide very clear, understandable examples
        and tutorials of RestructuredText usage.

        '
      - 'It borrows from several sources including:

